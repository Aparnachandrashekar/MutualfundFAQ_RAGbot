services:
  - type: web
    name: mutualfund-faq-api
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r deploy/requirements-api.txt
    startCommand: uvicorn phase3.api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: USE_LLM
        value: "true"
      - key: PHASE2_DIR
        value: data/phase2_results
      - key: SERVE_UI
        value: "false"
