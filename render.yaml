services:
  - type: web
    name: mutualfund-faq-api
    runtime: python
    plan: starter
    buildCommand: bash deploy/render-build.sh
    startCommand: uvicorn phase3.api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MISE_PYTHON_GITHUB_ATTESTATIONS
        value: "false"
      - key: HF_HOME
        value: /opt/render/project/src/.cache/huggingface
      - key: TRANSFORMERS_OFFLINE
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: USE_LLM
        value: "true"
      - key: PHASE2_DIR
        value: data/phase2_results
      - key: SERVE_UI
        value: "false"
      - key: RETRIEVAL_MODE
        value: "bm25_only"
      - key: OMP_NUM_THREADS
        value: "1"
